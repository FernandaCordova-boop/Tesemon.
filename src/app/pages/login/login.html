<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Bienvenido de Vuelta</h2>
      <p>Inicia sesión para continuar tu aventura</p>
    </div>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-wrapper">
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="entrenador@pokemon.com"
            [ngClass]="{ 'is-invalid': f['email'].touched && f['email'].invalid }"
          >
        </div>
        <div class="error-msg" *ngIf="f['email'].touched && f['email'].errors?.['required']">
          El correo es obligatorio.
        </div>
        <div class="error-msg" *ngIf="f['email'].touched && f['email'].errors?.['email']">
          El formato del correo es inválido.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="********"
            [ngClass]="{ 'is-invalid': f['password'].touched && f['password'].invalid }"
          >
        </div>
        <div class="error-msg" *ngIf="f['password'].touched && f['password'].errors?.['required']">
          La contraseña es obligatoria.
        </div>
      </div>

      <div class="alert error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Entrar a la Arena</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

    </form>

    <div class="auth-footer">
      <p>¿Aún no tienes una cuenta? <a routerLink="/register">Regístrate</a></p>
    </div>
  </div>
</div>
